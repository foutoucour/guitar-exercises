<div class="chord-guess-feedback {{ 'correct' if correct else 'incorrect' }}" id="chord-guess" data-auto-advance="{{ '1' if correct else '0' }}">
  {% if correct %}
    <span class="answer-feedback">✓ Correct: {{ expected_name }}</span>
    <span class="next-chord-hint" aria-live="polite">Next chord coming up…</span>
    <script>setTimeout(function () { window.location.assign('/exercises/chord-name'); }, 1200);</script>
  {% else %}
    <span class="answer-feedback">✗ You said {{ guess }} — the chord is {{ expected_name }}</span>
    <a class="new-chord" href="/exercises/chord-name">New chord</a>
  {% endif %}
</div>
