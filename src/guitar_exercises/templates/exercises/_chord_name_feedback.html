<div class="chord-guess-feedback {{ 'correct' if correct else 'incorrect' }}" id="chord-guess" data-auto-advance="{{ '1' if correct else '0' }}"{% if not correct %} data-key-advance="/exercises/chord-name"{% endif %}>
  {% if correct %}
    <span class="answer-feedback feedback-stamp feedback-stamp--correct">✓ Correct: {{ expected_name }}</span>
    <span class="next-chord-hint" aria-live="polite">Next chord coming up…</span>
    <a class="new-chord" href="/exercises/chord-name">Next chord</a>
    <script>
      (function () {
        if (window.GuitarExercises && typeof window.GuitarExercises.advanceTo === 'function') {
          const fallback = document.currentScript.previousElementSibling;
          if (fallback) fallback.hidden = true;
          window.GuitarExercises.advanceTo('/exercises/chord-name');
        }
      })();
    </script>
  {% else %}
    <span class="answer-feedback feedback-stamp feedback-stamp--incorrect">✗ You said {{ guess }} — the chord is {{ expected_name }}</span>
    <a class="new-chord" href="/exercises/chord-name">New chord</a>
  {% endif %}
</div>
