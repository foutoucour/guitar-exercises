<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Guitar Exercises{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/static/css/app.css?v=m3-9">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="topbar-brand" href="/" aria-label="Guitar Exercises — home">
      <span class="topbar-brand-mark">Guitar Exercises</span>
    </a>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <footer class="sitefoot" aria-label="Site footer">
    <span class="sitefoot-version" title="Build date and commit">v{{ app_version }}</span>
  </footer>
</body>
</html>
