<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Guitar Exercises{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@400;700&subset=latin&display=swap">
  <link rel="stylesheet" href="/static/css/app.css?v=rollout-1">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="/static/js/auto-advance.js?v=m3-16" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="topbar">
    <a class="topbar-brand" href="/" aria-label="Guitar Exercises — home">
      <svg class="topbar-brand-fretboard" viewBox="0 0 44 28" width="44" height="28" aria-hidden="true" focusable="false">
        <line x1="3" y1="3" x2="3" y2="25" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
        <line x1="17" y1="4" x2="17" y2="24" stroke="currentColor" stroke-width="1" opacity="0.6"/>
        <line x1="31" y1="4" x2="31" y2="24" stroke="currentColor" stroke-width="1" opacity="0.6"/>
        <line x1="4" y1="5" x2="42" y2="5" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <line x1="4" y1="9" x2="42" y2="9" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <line x1="4" y1="13" x2="42" y2="13" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <line x1="4" y1="17" x2="42" y2="17" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <line x1="4" y1="21" x2="42" y2="21" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <line x1="4" y1="25" x2="42" y2="25" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <circle cx="36.5" cy="14" r="1.7" fill="currentColor" opacity="0.5"/>
      </svg>
      <span class="topbar-brand-title">Guitar Exercises</span>
    </a>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <footer class="sitefoot" aria-label="Site footer">
    <span class="sitefoot-version" title="Build date and commit">v{{ app_version }}</span>
  </footer>
</body>
</html>
